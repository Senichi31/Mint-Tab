<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Bookmarks</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="main-layout">
    <nav id="sidebar">
      <div class="sidebar-header">
	<img src="icon.png" class="sidebar-logo" alt="Logo">
        <span class="brand-name">Mint-Tab</span>
      </div>
      <!-- 折叠切换按钮固定在侧边栏顶部 -->
      <div id="sidebar-toggle-inner" title="Toggle Sidebar">☰</div>
      <!-- 动态生成的文件夹项将放入这个容器中 -->
      <div id="sidebar-content">
      </div>
    </nav>
    
    <main id="content-area">
      <div class="toolbar">
        <h2 id="current-folder-name">Loading...</h2>
        <div class="controls">
          <div class="control-group">
	    <div class="search-mode-container" data-tooltip="Search in:">
  	      <label class="switch">
        	<input type="checkbox" id="search-global-toggle">
        	<span class="slider"></span>
              </label>
              <span id="search-mode-text">Current Folder</span>
	    </div>
          </div>

          <input type="text" id="search-input" placeholder="🔎︎ Search bookmark...">
         
          <div class="control-group">
            <button id="sort-toggle" title="Sort: A-Z">A-Z</button>
            <span class="btn-label">Sort</span>
          </div>

          <div class="control-group">
            <button id="layout-toggle" title="Switch Layout">⊞</button>
            <span id="layout-text" class="btn-label">Grid</span>
          </div>

          <div class="control-group">
            <button id="dark-mode-toggle" title="Toggle Dark Mode">🌙</button>
            <span id="theme-text" class="btn-label">Night</span>
          </div>
        </div>
      </div>

      <div id="bookmark-grid" class="grid-container"></div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
